name: Build Proxy

on: ['push', 'workflow_dispatch']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore --filter "FullyQualifiedName!~MovementInfoSpanTests"

  build:
    strategy:
      matrix:
        os: ['windows', 'ubuntu', 'macos']
    runs-on: ${{ matrix.os }}-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish
        if: matrix.os != 'macos'
        run: dotnet publish HermesProxy --configuration Release --use-current-runtime -p:UsePublishBuildSettings=true

      - name: Publish (MacOS x86_64 and arm64)
        if: matrix.os == 'macos'
        run: |
          dotnet publish HermesProxy --configuration Release --runtime osx-arm64 -p:UsePublishBuildSettings=true
          dotnet publish HermesProxy --configuration Release --runtime osx-x64 -p:UsePublishBuildSettings=true
          lipo ./HermesProxy/bin/Release/osx-arm64/publish/HermesProxy ./HermesProxy/bin/Release/osx-x64/publish/HermesProxy -create -output ./HermesProxy/bin/Release/osx-x64/publish/HermesProxy_universal
          mv ./HermesProxy/bin/Release/osx-x64/publish/HermesProxy_universal ./HermesProxy/bin/Release/osx-x64/publish/HermesProxy
          rm -rf ./HermesProxy/bin/Release/osx-arm64

      - name: Copy files
        run: cp -r ./HermesProxy/bin/Release/*/publish/ publish

      - name: Mark as executable
        if: matrix.os != 'windows'
        run: chmod a+x publish/HermesProxy

      - name: Make a tar.gz with permissions out of it (for Linux)
        if: matrix.os == 'ubuntu'
        run: |
          mv publish HermesProxy-${{ matrix.os }}-${{ runner.arch }}-${{ github.sha }}
          tar -czvf HermesProxy-${{ matrix.os }}-${{ runner.arch }}-${{ github.sha }}.tar.gz HermesProxy-${{ matrix.os }}-${{ runner.arch }}-${{ github.sha }}

      - name: Make a zip with permissions out of it (for MacOS)
        if: matrix.os == 'macos'
        run: |
          mv publish HermesProxy-${{ matrix.os }}-universal-${{ github.sha }}
          zip -vr HermesProxy-${{ matrix.os }}-universal-${{ github.sha }}.zip HermesProxy-${{ matrix.os }}-universal-${{ github.sha }}

      - name: Upload build artifact (Windows)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: HermesProxy-${{ matrix.os }}-${{ runner.arch }}-${{ github.sha }}
          path: publish
          if-no-files-found: error
          compression-level: 1

      - name: Upload build artifact (Linux)
        if: matrix.os == 'ubuntu'
        uses: actions/upload-artifact@v4
        with:
          name: HermesProxy-${{ matrix.os }}-${{ runner.arch }}-${{ github.sha }}
          path: HermesProxy-${{ matrix.os }}-${{ runner.arch }}-${{ github.sha }}.*
          if-no-files-found: error
          compression-level: 1

      - name: Upload build artifact (MacOS)
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: HermesProxy-${{ matrix.os }}-universal-${{ github.sha }}
          path: HermesProxy-${{ matrix.os }}-universal-${{ github.sha }}.*
          if-no-files-found: error
          compression-level: 1

  # Gate: fails the workflow if tests failed, even though builds may have succeeded
  verify:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed — artifacts from this run should not be trusted"
            exit 1
          fi
